events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        # Requirement 1: Route / to the frontend container
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Requirement 2: Route /api/ to the backend container
        location /api/ {
            # This forwards requests from Nginx to the .NET backend
            proxy_pass http://backend:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
